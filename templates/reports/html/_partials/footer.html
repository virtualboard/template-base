<footer>
  <div class="brand-footer">
    <div class="brand-mark" style="width:24px;height:24px;border-radius:6px;">
      <img alt="{{BRAND_NAME}}" style="width:100%;height:100%;display:block;" src="{{BRAND_LOGO_DATAURI}}">
    </div>
    <span class="name">{{BRAND_NAME}}</span>
    <span>·</span>
    <span>{{BRAND_TAGLINE}}</span>
  </div>
  <p style="margin: 0;">{{FOOTER_PRIMARY_LINE}}</p>
  <p style="margin: 8px 0 0; font-size: 12px;">{{FOOTER_SECONDARY_LINE}}</p>
  {{FOOTER_NOTE_BLOCK}}
</footer>
